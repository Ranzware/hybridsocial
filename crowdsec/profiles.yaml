# CrowdSec profiles — decide what happens when a scenario fires.
#
# Each new ban is (a) added to the local decision DB so the Caddy
# bouncer drops the IP, AND (b) routed to the email_default notifier,
# which buffers and digests them per the 10-minute group_wait.
#
# Decisions remain in effect until they expire on their own — we
# don't break the chain after notify, so future re-bans on the same
# IP also produce notifications.

name: default_ip_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
  - type: ban
    duration: 4h
# Email digest disabled until SMTP is configured — re-add
#   notifications:
#     - email_default
# once crowdsec/notifications/email.yaml is wired + SMTP_* set in .env.
on_success: continue
---
name: default_range_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Range"
decisions:
  - type: ban
    duration: 4h
# Email digest disabled until SMTP is configured — re-add
#   notifications:
#     - email_default
# once crowdsec/notifications/email.yaml is wired + SMTP_* set in .env.
on_success: continue
