# Coraza WAF engine configuration for HybridSocial.
#
# Tuned for a federated social platform: larger request body limits
# than a typical app (media uploads — 100 MB ceiling), with response
# body inspection only on text/HTML/JSON (skip binary streams).
#
# Audit log goes to /var/log/caddy/coraza-audit.log; CrowdSec is
# pointed at the Caddy access log, not this one — the audit log is
# for human triage of false positives.

SecRuleEngine On
SecRequestBodyAccess On

# 100 MB total body cap (covers HybridSocial's video uploads). The
# in-memory portion is small; Coraza spills to disk past 128 KB.
SecRequestBodyLimit 104857600
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyInMemoryLimit 131072
SecRequestBodyLimitAction Reject

# Response body scanning helps catch reflected XSS / data leakage. We
# only inspect human-readable types — skipping binary cuts overhead.
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json application/ld+json application/activity+json
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

# CRS v4 sets its own SecDefaultAction (deny + 403) once
# tx.blocking_paranoia_level >= the rule's paranoia. We don't
# override here — Coraza disallows re-declaration for the same
# phase, and CRS's defaults match what we want.

SecAuditEngine RelevantOnly
# RE2-compatible (no negative lookahead): log all 5xx, plus 401/403/429.
# Ignores routine 404s and 400s so the audit log stays focused on
# blocked-by-WAF and server-fault traffic.
SecAuditLogRelevantStatus "^(401|403|429|5\d\d)$"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/caddy/coraza-audit.log

SecArgumentSeparator &
SecCookieFormat 0

SecTmpDir /tmp/coraza
SecDataDir /tmp/coraza
SecUploadDir /tmp/coraza
